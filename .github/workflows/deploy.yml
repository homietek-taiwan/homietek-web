name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install --include=dev

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_TAWK_PROPERTY_ID: "6a4a7f31ddba321d4575c90d"
          NEXT_PUBLIC_TAWK_WIDGET_ID: "1jspg1m89"
          NEXT_PUBLIC_N8N_WEBHOOK_URL: "https://broadway-rugs-candle-semi.trycloudflare.com/webhook/homietek-chat"
          NEXT_PUBLIC_BASE_PATH: "/homietek-web"




      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
